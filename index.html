<script type="module">
  import React, { useState, useEffect, useRef } from 'https://esm.sh/react@18';
  import ReactDOM from 'https://esm.sh/react-dom@18/client';

  const h = React.createElement;

  // ----- Hardcoded Mirasee assets -----
  // Combined headshot + signature image (provided by the Mirasee team)
  const DANNY_SIGNATURE_COMBINED = 'https://i.ontraport.com/thumbs/265108.820fea3a03c264f37561703e543fb148.PNG';

  // ----- Mirasee CSS that gets pasted into Ontraport's custom CSS -----
  const MIRASEE_CSS = `<style>

}
.logo-tab {
  width: 265px;
  height: 90px;

  margin-left: -3rem;
  background: url('data:image/svg+xml,<svg width="264" height="88" viewBox="0 0 264 88" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M33.5 40.5C32.1278 25.8757 22.3889 11.0857 7.39674 5.33114L7.39671 5.33113C7.36722 5.31981 7.35246 5.31415 7.30548 5.29718C6.82835 5.1249 6.2145 5.01114 5.70731 5.001C5.65736 5 5.62001 5 5.54532 5H2.5C1.11929 5 0 3.88071 0 2.5C0 1.11929 1.11929 0 2.5 0H261.5C262.881 0 264 1.11929 264 2.5C264 3.88071 262.881 5 261.5 5H260.161C259.724 5 259.287 5.07343 258.878 5.22697C243.73 10.9055 233.881 25.7866 232.5 40.5V77.5C232.5 82.214 232.5 84.5711 231.036 86.0355C229.571 87.5 227.214 87.5 222.5 87.5H43.5C38.786 87.5 36.4289 87.5 34.9645 86.0355C33.5 84.5711 33.5 82.214 33.5 77.5V40.5Z" fill="white"/></svg>') no-repeat center top;

  // ----- Template configurations -----
  const TEMPLATES = {
    'text-landing': {
      name: 'Text Landing',
      description: 'Hero with headline + subheadline, body copy, signature footer.',
      icon: '📄',
      hasVideo: false,
      hasForm: false,
    },
    'video-landing': {
      name: 'Video Landing',
      description: 'Hero + Wistia video + body copy + CTA + signature footer.',
      icon: '🎬',
      hasVideo: true,
      hasForm: false,
    },
    'text-form-landing': {
      name: 'Text Landing with Form',
      description: 'Text landing with an Ontraport form embedded at your chosen position.',
      icon: '📝',
      hasVideo: false,
      hasForm: true,
    },
  };

  // ----- The system prompt sent to Claude API -----
  function buildSystemPrompt(templateKey, options) {
    const t = TEMPLATES[templateKey];
    return `You are an expert page-copy structurer for Mirasee — an online education company that publishes landing pages built in Ontraport Pages.

You will receive raw marketing copy from a page designer. Your job is to intelligently structure that copy into a clean JSON object that maps onto a Mirasee "${t.name}" template.

THE TEMPLATE STRUCTURE has these slots:
1. hero_headline — the main H1 shown over the blue gradient hero. Concise, punchy, 3-10 words. Sentence case with trailing punctuation if present in original. Plain text only — no HTML.
2. hero_subheadline — a single supporting line shown under the headline in the hero. 5-15 words. Plain text only.
3. body_html — the main body content shown below the hero on white background. Output as clean HTML with <p> tags for paragraphs, <strong> for bold emphasis on dates/key phrases, <em> for italic emphasis. Use <strong> sparingly — only where the source clearly emphasizes (bold dates, key takeaways, names of products). Do NOT add classes, ids, or styles. Do NOT wrap in <div>. Do NOT include <h1>, <h2>, etc — keep body as paragraphs. If the original ends with a sign-off line like "See you soon," keep it as its own <p>.
4. cta_text — the text on the primary action button. 2-6 words. Title Case. If no CTA is present in the source copy, return null.
5. cta_url — if a URL is mentioned in the copy, extract it. Otherwise return null.
${t.hasVideo ? '6. video_intro_text — optional 1-2 sentence intro that goes ABOVE the video (often a small expiry notice in yellow, like "Expires Wednesday at Midnight Pacific..."). Return null if not present.\n' : ''}
RULES:
- Do NOT invent content. Only restructure what the user provides. If the user did not give a subheadline, return an empty string for hero_subheadline.
- Do NOT change wording. Preserve the writer's voice exactly. You are formatting, not rewriting.
- Use proper smart quotes ("" '' ') and em-dashes (—) where appropriate.
- For emphasis: bold dates and times, bold product/event names on first mention, italicize words the writer clearly meant to italicize (often surrounded by * or _ in the input, or contextually emphasized).
- Output ONLY a single JSON object. No prose, no markdown fences, no explanation.

OUTPUT FORMAT (JSON, no other text):
{
  "hero_headline": "...",
  "hero_subheadline": "...",
  "body_html": "<p>...</p><p>...</p>",
  "cta_text": "..." or null,
  "cta_url": "..." or null${t.hasVideo ? ',\n  "video_intro_text": "..." or null' : ''}
}`;
  }

  // ----- Call the Anthropic API directly from the browser -----
  async function callClaude(apiKey, systemPrompt, userCopy) {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 2000,
        system: systemPrompt,
        messages: [{ role: 'user', content: userCopy }],
      }),
    });
    if (!res.ok) {
      const err = await res.text();
      throw new Error(`API error ${res.status}: ${err}`);
    }
    const data = await res.json();
    const text = data.content.map(b => b.type === 'text' ? b.text : '').join('').trim();
    // Strip code fences if Claude added them
    const cleaned = text.replace(/^```json\s*/i, '').replace(/^```\s*/, '').replace(/```\s*$/, '').trim();
    return JSON.parse(cleaned);
  }

  // ----- Generators for the various output blocks -----
  function generateTimerBlock() {
    return `<!-- COUNTDOWN TIMER BLOCK — drop into an Ontraport HTML element -->
<!-- IMPORTANT: Ontraport has a built-in countdown widget. Use that for the live counter. -->
<!-- This snippet is the visual frame; replace the {{0}} values with Ontraport's merge tags. -->
<div style="background:#1E40AF;color:white;padding:1.5rem;display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;text-align:center;font-family:'Montserrat',sans-serif;">
  <div><div style="font-size:2.25rem;font-weight:700;line-height:1;">[[days]]</div><div style="font-size:0.75rem;letter-spacing:0.1em;opacity:0.85;margin-top:0.25rem;">DAYS</div></div>
  <div><div style="font-size:2.25rem;font-weight:700;line-height:1;">[[hours]]</div><div style="font-size:0.75rem;letter-spacing:0.1em;opacity:0.85;margin-top:0.25rem;">HOURS</div></div>
  <div><div style="font-size:2.25rem;font-weight:700;line-height:1;">[[minutes]]</div><div style="font-size:0.75rem;letter-spacing:0.1em;opacity:0.85;margin-top:0.25rem;">MINUTES</div></div>
  <div><div style="font-size:2.25rem;font-weight:700;line-height:1;">[[seconds]]</div><div style="font-size:0.75rem;letter-spacing:0.1em;opacity:0.85;margin-top:0.25rem;">SECONDS</div></div>
</div>`;
  }

  function generateWistiaBlock(videoId) {
    if (!videoId) videoId = 'YOUR_WISTIA_ID';
    return `<!-- WISTIA VIDEO EMBED — drop into an Ontraport HTML element -->
<script src="https://fast.wistia.com/embed/medias/${videoId}.jsonp" async></` + `script>
<script src="https://fast.wistia.com/assets/external/E-v1.js" async></` + `script>
<div class="wistia_responsive_padding" style="padding:56.25% 0 0 0;position:relative;">
  <div class="wistia_responsive_wrapper" style="height:100%;left:0;position:absolute;top:0;width:100%;">
    <div class="wistia_embed wistia_async_${videoId} videoFoam=true" style="height:100%;position:relative;width:100%;">&nbsp;</div>
  </div>
</div>`;
  }

  function generateOntraportFormBlock(formId) {
    if (!formId) formId = 'YOUR_FORM_ID';
    return `<!-- ONTRAPORT FORM EMBED — drop into an Ontraport HTML element OR use the native form widget -->
<!-- Replace ${formId} with the actual form ID from Ontraport > Forms -->
<div align="center">
  <script type="text/javascript" src="https://forms.ontraport.com/v2.4/include/formEditor/genembed.php?id=${formId}" data-cfasync="false"></` + `script>
</div>
<!-- TIP: In Ontraport Pages, you can also drag the native "Form" element onto the page and select form ID ${formId} from the dropdown — that's usually cleaner than this script embed. -->`;
  }

  function generateSignaturePlaceholder() {
    return `<!-- SIGNATURE / FOOTER ROW — drop into an Ontraport HTML element -->
<div style="margin:2rem 0;font-family:'Montserrat',sans-serif;">
  <img src="${DANNY_SIGNATURE_COMBINED}" alt="Danny Iny" style="max-width:320px;width:100%;height:auto;display:block;image-rendering:-webkit-optimize-contrast;image-rendering:crisp-edges;filter:contrast(1.06) saturate(1.05);" />

  // ----- Build a full standalone HTML preview -----
  function buildStandaloneHTML(templateKey, structured, options) {
    const t = TEMPLATES[templateKey];
    const heroSub = structured.hero_subheadline ? `<p class="hero-sub">${escapeHtml(structured.hero_subheadline)}</p>` : '';
    const videoIntro = (t.hasVideo && structured.video_intro_text)
      ? `<p style="color:#FFC72C;font-weight:600;text-align:center;margin:0 2rem 0.5rem;">${escapeHtml(structured.video_intro_text)}</p>`
      : '';
    const videoBlock = t.hasVideo
      ? `<div class="video-block">${options.wistiaId ? `<!-- Wistia ID: ${options.wistiaId} -->` : ''}[ Wistia video player — ID: ${options.wistiaId || 'YOUR_WISTIA_ID'} ]</div>`
      : '';
    const timerBlock = options.includeTimer
      ? `<div class="timer-block">
          <div class="timer-cell"><div class="num">0</div><div class="lbl">DAYS</div></div>
          <div class="timer-cell"><div class="num">0</div><div class="lbl">HOURS</div></div>
          <div class="timer-cell"><div class="num">0</div><div class="lbl">MINUTES</div></div>
          <div class="timer-cell"><div class="num">0</div><div class="lbl">SECONDS</div></div>
        </div>`
      : '';
    const ctaBlock = structured.cta_text
      ? `<div style="text-align:center;margin:2rem 0;"><a class="cta-btn" href="${structured.cta_url || '#'}">${escapeHtml(structured.cta_text)} →</a></div>`
      : '';
    const formBlock = (t.hasForm)
      ? `<div class="form-block">[ Ontraport Form — ID: ${options.formId || 'YOUR_FORM_ID'} ]</div>`
      : '';
    const signature = `<div class="signature-row">
        <img src="${DANNY_SIGNATURE_COMBINED}" alt="Danny Iny" />
      </div>`;

    // Decide where the form goes (form templates only)
    let bodyContent = structured.body_html || '';
    if (t.hasForm) {
      const pos = options.formPosition || 'after-body';
      if (pos === 'before-body') bodyContent = formBlock + bodyContent;
      else if (pos === 'after-body') bodyContent = bodyContent + formBlock;
      else if (pos === 'middle') {
        const paras = bodyContent.split('</p>').filter(Boolean);
        const mid = Math.floor(paras.length / 2);
        bodyContent = paras.slice(0, mid).join('</p>') + '</p>' + formBlock + paras.slice(mid).join('</p>') + (paras.length > 0 ? '' : '');
      }
    }

    return `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>${escapeHtml(structured.hero_headline || 'Mirasee Page')}</title>
${MIRASEE_CSS.replace(/<\/?style>/g, '')
  .replace(/^/, '<style>')
  .concat(`

  function escapeHtml(s) {
    if (!s) return '';
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function App() {
    const [apiKey, setApiKey] = useState(() => localStorage.getItem('claude_api_key') || '');
    const [showApiKey, setShowApiKey] = useState(false);
    const [templateKey, setTemplateKey] = useState('text-landing');
    const [rawCopy, setRawCopy] = useState('');
    const [includeTimer, setIncludeTimer] = useState(false);
    const [wistiaId, setWistiaId] = useState('');
    const [formId, setFormId] = useState('');
    const [formPosition, setFormPosition] = useState('after-body');
    const [loading, setLoading] = useState(false);
    const [error, setError] = useState('');
    const [result, setResult] = useState(null);
    const [outputMode, setOutputMode] = useState('snippets'); // 'snippets' or 'standalone'
    const [activeTab, setActiveTab] = useState('preview');

    // Persist API key locally so it isn't re-entered each time
    useEffect(() => {
      if (apiKey) localStorage.setItem('claude_api_key', apiKey);
    }, [apiKey]);

    const template = TEMPLATES[templateKey];

    async function handleGenerate() {
      setError('');
      if (!apiKey.trim()) {
        setError('Please enter your Anthropic API key first.');
        return;
      }
      if (!rawCopy.trim()) {
        setError('Please paste some copy first.');
        return;
      }
      if (template.hasForm && !formId.trim()) {
        setError('This template requires an Ontraport Form ID. (You can use a placeholder like 12345 if you don\'t have it yet.)');
        return;
      }

      setLoading(true);
      try {
        const sys = buildSystemPrompt(templateKey, { includeTimer, wistiaId, formId, formPosition });
        const structured = await callClaude(apiKey, sys, rawCopy);
        setResult(structured);
        setActiveTab('preview');
      } catch (e) {
        setError(e.message || String(e));
      } finally {
        setLoading(false);
      }
    }

    return h('div', { className: 'min-h-screen' },
      h(Header, null),
      h('main', { className: 'max-w-7xl mx-auto px-6 py-8' },
        h(ApiKeyBar, { apiKey, setApiKey, showApiKey, setShowApiKey }),
        h('div', { className: 'grid grid-cols-1 lg:grid-cols-2 gap-6 mt-6' },
          // LEFT: Input panel
          h(InputPanel, {
            templateKey, setTemplateKey,
            rawCopy, setRawCopy,
            includeTimer, setIncludeTimer,
            wistiaId, setWistiaId,
            formId, setFormId,
            formPosition, setFormPosition,
            template,
            onGenerate: handleGenerate,
            loading, error,
          }),
          // RIGHT: Output panel
          h(OutputPanel, {
            result, loading, template, templateKey,
            options: { includeTimer, wistiaId, formId, formPosition },
            outputMode, setOutputMode,
            activeTab, setActiveTab,
          }),
        ),
        h(Footer, null),
      ),
    );
  }

    );
  }

  function StandaloneTab({ result, templateKey, options }) {
    const html = buildStandaloneHTML(templateKey, result, options);
    function downloadHTML() {
      const blob = new Blob([html], { type: 'text/html' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `mirasee-${templateKey}-${Date.now()}.html`;
      a.click();
      URL.revokeObjectURL(url);
    }
    function openPreview() {
      const blob = new Blob([html], { type: 'text/html' });
      const url = URL.createObjectURL(blob);
      window.open(url, '_blank');
    }
    return h('div', null,
      h('div', { className: 'flex items-center gap-2 mb-3' },
        h('button', {
          onClick: openPreview,
          className: 'px-4 py-2 rounded-lg bg-mirasee-blue text-white text-sm font-semibold hover:opacity-90',
        }, '🔗 Open in new tab'),
        h('button', {
          onClick: downloadHTML,
          className: 'px-4 py-2 rounded-lg border border-stone-300 text-sm font-semibold hover:bg-stone-50',
        }, '⬇️  Download .html'),
        h(CopyButton, { text: html, label: 'Copy HTML' }),
      ),
      h('p', { className: 'text-xs text-stone-500 mb-3' },
        'A complete standalone HTML file. Useful for previewing the page outside Ontraport, sharing with stakeholders, or as a backup reference. NOT for pasting into Ontraport — use the Snippets tab for that.',
      ),
      h('pre', { className: 'code-block' }, html),
    );
  }

  function ChecklistTab({ result, template, options }) {
    const steps = [];
    steps.push('Open Ontraport → Pages → New Landing Page (or duplicate an existing Mirasee template).');
    steps.push('Open Page Settings → Custom CSS, paste the CSS from snippet A. Save.');
    steps.push('Drag a Section element. Set its background to transparent and add the class "bg-hero" (or apply via custom CSS).');
    steps.push('Inside the hero section, add a Text element at the top-left with class "logo-tab" — upload the Mirasee logo image.');
    steps.push(`Add a Headline element. Paste the H1 from snippet B: "${result.hero_headline}".`);
    if (result.hero_subheadline) {
      steps.push(`Add a Text element below the headline. Paste snippet C (subheadline) so it shows in light blue.`);
    }
    steps.push('Drag a new Section below the hero. Add the class "text-content" so it overlaps the hero (negative margin pulls it up over the curve).');
    if (template.hasVideo) {
      if (result.video_intro_text) steps.push('Inside the text-content section, add a Text element with snippet D (yellow video intro).');
      steps.push(`Add an HTML element. Paste snippet E (Wistia embed). Wistia ID: ${options.wistiaId || '⚠️  not set — replace YOUR_WISTIA_ID'}.`);
    }
    if (options.includeTimer) {
      steps.push('Add Ontraport\'s native Countdown element OR an HTML element with snippet F. Set the target date in Ontraport.');
    }
    if (template.hasForm && options.formPosition === 'before-body') {
      steps.push(`Add the Ontraport Form element. Select form ID ${options.formId}. (This goes BEFORE the body copy.)`);
    }
    steps.push('Add a Text element. Paste snippet G (body copy) into the rich-text editor in Source/HTML mode.');
    if (template.hasForm && options.formPosition === 'middle') {
      steps.push(`Add the Ontraport Form element in the middle of the body. Select form ID ${options.formId}.`);
    }
    if (template.hasForm && options.formPosition === 'after-body') {
      steps.push(`Add the Ontraport Form element after the body copy. Select form ID ${options.formId}.`);
    }
    if (result.cta_text) {
      steps.push(`Add a Button element. Label: "${result.cta_text}". Style: Mirasee yellow (#FFC72C), pill rounded, dark text. URL: ${result.cta_url || 'set this manually'}.`);
    }
    steps.push('Add the signature row (snippet J) — upload Danny\'s headshot and signature image, replace the placeholder URLs.');
    steps.push('Add a Footer section with the mirasee logo (left) and "Copyright © 2026 Mirasee. All Rights Reserved." (right).');
    steps.push('Preview the page. Check mobile view. Save & publish.');

    return h('div', null,
      h('p', { className: 'text-xs text-stone-500 mb-4' },
        'Step-by-step build instructions for this specific page. Tick off as you go.',
      ),
      h('ol', { className: 'space-y-2' },
        steps.map((s, i) =>
          h('li', { key: i, className: 'flex items-start gap-3 p-3 rounded-lg bg-stone-50 border border-stone-200' },
            h('span', {
              className: 'flex-shrink-0 w-6 h-6 rounded-full bg-mirasee-blue text-white text-xs font-bold flex items-center justify-center',
            }, i + 1),
            h('div', { className: 'text-sm text-mirasee-ink leading-relaxed' }, s),
          ),
        ),
      ),
    );
  }

  function SnippetBlock({ label, help, code }) {
    return h('div', { className: 'border border-stone-200 rounded-lg overflow-hidden' },
      h('div', { className: 'px-4 py-2.5 bg-stone-50 border-b border-stone-200 flex items-center justify-between gap-3' },
        h('div', { className: 'flex-1 min-w-0' },
          h('div', { className: 'text-xs font-semibold text-mirasee-ink truncate' }, label),
          help && h('div', { className: 'text-[11px] text-stone-500 mt-0.5' }, help),
        ),
        h(CopyButton, { text: code }),
      ),
      h('pre', { className: 'code-block !rounded-none !max-h-[280px]' }, code),
    );
  }

  function CopyButton({ text, label }) {
    const [copied, setCopied] = useState(false);
    function copy() {
      navigator.clipboard.writeText(text).then(() => {
        setCopied(true);
        setTimeout(() => setCopied(false), 2000);
      });
    }
    return h('button', {
      onClick: copy,
      className: `px-3 py-1.5 rounded text-xs font-semibold transition flex-shrink-0 ${copied ? 'bg-emerald-500 text-white' : 'bg-mirasee-ink text-white hover:bg-stone-700'}`,
    }, copied ? '✓ Copied' : (label || 'Copy'));
  }

  function Footer() {
    return h('footer', { className: 'mt-12 pt-6 border-t border-stone-200 text-center text-xs text-stone-500' },
      h('p', null,
        'Built for the Mirasee design team · ',
        h('a', { href: 'https://docs.claude.com', className: 'text-mirasee-blue hover:underline' }, 'Powered by Claude'),
        ' · ',
        h('span', null, 'Your API key and copy never leave your browser'),
      ),
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
