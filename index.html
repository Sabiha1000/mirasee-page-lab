  // ----- Template configurations -----
  const TEMPLATES = {
    'text-landing': {
      name: 'Text Landing',
      description: 'Hero with headline + subheadline, body copy, signature footer.',
      icon: '📄',
      hasVideo: false,

  // ----- The system prompt sent to Claude API -----
  function buildSystemPrompt(templateKey, options) {
    const t = TEMPLATES[templateKey];
    return `You are an expert page-copy structurer for Mirasee — an online education company that publishes landing pages built in Ontraport Pages.

You will receive raw marketing copy from a page designer. Your job is to intelligently structure that copy into a clean JSON object that maps onto a Mirasee "${t.name}" template.

THE TEMPLATE STRUCTURE has these slots:
1. hero_headline — the main H1 shown over the blue gradient hero. Concise, punchy, 3-10 words. Sentence case with trailing punctuation if present in original. Plain text only — no HTML.
2. hero_subheadline — a single supporting line shown under the headline in the hero. 5-15 words. Plain text only.
3. body_html — the main body content shown below the hero on white background. Output as clean HTML with <p> tags for paragraphs, <strong> for bold emphasis on dates/key phrases, <em> for italic emphasis. Use <strong> sparingly — only where the source clearly emphasizes (bold dates, key takeaways, names of products). Do NOT add classes, ids, or styles. Do NOT wrap in <div>. Do NOT include <h1>, <h2>, etc — keep body as paragraphs. If the original ends with a sign-off line like "See you soon," keep it as its own <p>.
4. cta_text — the text on the primary action button. 2-6 words. Title Case. If no CTA is present in the source copy, return null.
5. cta_url — if a URL is mentioned in the copy, extract it. Otherwise return null.
${t.hasVideo ? '6. video_intro_text — optional 1-2 sentence intro that goes ABOVE the video (often a small expiry notice in yellow, like "Expires Wednesday at Midnight Pacific..."). Return null if not present.\n' : ''}
RULES:
- Do NOT invent content. Only restructure what the user provides. If the user did not give a subheadline, return an empty string for hero_subheadline.
- Do NOT change wording. Preserve the writer's voice exactly. You are formatting, not rewriting.
- Use proper smart quotes ("" '' ') and em-dashes (—) where appropriate.
- For emphasis: bold dates and times, bold product/event names on first mention, italicize words the writer clearly meant to italicize (often surrounded by * or _ in the input, or contextually emphasized).
- Output ONLY a single JSON object. No prose, no markdown fences, no explanation.

OUTPUT FORMAT (JSON, no other text):
{
  "hero_headline": "...",
  "hero_subheadline": "...",
  "body_html": "<p>...</p><p>...</p>",
  "cta_text": "..." or null,
  "cta_url": "..." or null${t.hasVideo ? ',\n  "video_intro_text": "..." or null' : ''}
}`;
  }

  // ----- Call the Anthropic API directly from the browser -----
  async function callClaude(apiKey, systemPrompt, userCopy) {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 2000,
        system: systemPrompt,
        messages: [{ role: 'user', content: userCopy }],
      }),
    });
    if (!res.ok) {
      const err = await res.text();
      throw new Error(`API error ${res.status}: ${err}`);
    }
    const data = await res.json();
    const text = data.content.map(b => b.type === 'text' ? b.text : '').join('').trim();
    // Strip code fences if Claude added them
    const cleaned = text.replace(/^```json\s*/i, '').replace(/^```\s*/, '').replace(/```\s*$/, '').trim();
    return JSON.parse(cleaned);
  }

  // ----- Chat API call (for body-section template) -----
  async function callClaudeChat(apiKey, systemPrompt, messages) {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 4000,
        system: systemPrompt,
        messages: messages,
      }),
    });
    if (!res.ok) {
      const err = await res.text();
      throw new Error(`API error ${res.status}: ${err}`);
    }
    const data = await res.json();
    return data.content.map(b => b.type === 'text' ? b.text : '').join('').trim();
  }

  function cleanHtmlResponse(text) {
    // Strip code fences if AI wrapped the output
    let cleaned = text.trim();
    cleaned = cleaned.replace(/^```html\s*/i, '');
    cleaned = cleaned.replace(/^```\s*/, '');
    cleaned = cleaned.replace(/```\s*$/, '');
    return cleaned.trim();
  }

  // Replace {{IMAGE_N}} placeholders with actual data URLs for the preview only.
  // The exported code keeps the {{IMAGE_N}} placeholders (or the user can pre-replace them).
  function applyImagePlaceholders(html, images) {
    if (!html || !images || images.length === 0) return html;
    let result = html;
    images.forEach((img, idx) => {
      const placeholder = `{{IMAGE_${idx + 1}}}`;
      const regex = new RegExp(placeholder.replace(/[{}]/g, '\\$&'), 'g');
      result = result.replace(regex, img.dataUrl);
    });
    return result;
  }

  // ----- System prompt for the Body Section chat template -----
  function buildBodySectionSystemPrompt() {
    return `You are a Mirasee body-section designer. You generate clean HTML body sections for Mirasee landing pages — sections that drop into pages where the header (blue gradient hero with curve) is already built into the template. You only output the body section, NOT a full HTML document.

LOCKED MIRASEE BRAND CONSTRAINTS (NEVER violate these regardless of what the user asks):
- Font: Montserrat ONLY. Never use any other font.
- Font weights: ONLY 400 (regular), 500 (medium), or 600 (semibold). NEVER use 700, 800, 900, or "bold".
- Colors (use ONLY these for primary content, accents, headlines, links, buttons):

  * Mirasee Teal: #0089BD (accent)
  * Mirasee Yellow: #FFC72C (CTA buttons, highlights)

LAYOUT FREEDOM (you have creative freedom here):

ICONS:

  * "growth / progress" → trending-up, arrow-up-right
  * "people / community" → users, user-plus
  * "time / schedule" → clock, calendar
  * "target / goal" → target, crosshair
  * "learning / education" → graduation-cap, book-open
  * "money / value" → dollar-sign, gift
  * "speed / efficiency" → zap, gauge
  * "security / trust" → shield, lock
  * "communication" → message-circle, mail
  * "warning / important" → alert-triangle, info
- Always use stroke-width="1.5" or "2", stroke="currentColor", fill="none" for outline style.
- Inline the SVG directly in the HTML (don't link to external icon libraries).
- Icon size: 20-28px usually. Color: Mirasee Blue or Teal for accent, Yellow for emphasis.

ANIMATIONS (subtle, professional, never flashy):
- Hover effects on CTAs and clickable elements: smooth color transitions, slight lift (transform: translateY(-2px)), subtle shadow.
- Optional: gentle fade-in on scroll using CSS animations (animation: fadeIn 0.6s ease-out).

CODE OUTPUT RULES:

- ALWAYS use inline styles or a <style> block at the top of your output (since this will be pasted into Ontraport's HTML element which has its own styling).
- Use semantic HTML: <h2>, <h3>, <p>, <ul>, <li>, <blockquote>, <a>, <button>.
- Make it responsive: use max-width, percentage widths, flex-wrap, or CSS grid with auto-fit.
- Default container max-width: 800px, centered with margin: 0 auto.
- Default padding: 2rem (mobile-friendly).

HANDLING UPLOADED IMAGES:
- If the user has attached images, look at them and use them in the section. You can SEE the image content.
- For images, use the placeholder URL "{{IMAGE_1}}", "{{IMAGE_2}}", etc. in order of attachment.
  Example: <img src="{{IMAGE_1}}" alt="..." style="...">
  The user will replace these placeholders with real hosted URLs after pasting into Ontraport.
- Always write descriptive alt text based on what you actually see in the image.
- Style images appropriately for the layout: rounded for headshots, full-width for hero images, contained for product shots.
- Add subtle styling: border-radius, box-shadow, max-width, height: auto for responsiveness.
- If the user uploads multiple images, decide intelligently how to lay them out: side-by-side grid, single column, or as part of a feature/testimonial structure.
- Tell the user briefly what you saw in the image only if it helps clarify your design choice (but the main output is still just HTML).

WHEN USER ASKS FOR EDITS:
- Read the current HTML provided in the user's message context.
- Make ONLY the requested change. Don't redesign the whole thing unless asked.
- Preserve the user's previous customizations.
- Preserve {{IMAGE_N}} placeholders unless explicitly told to remove an image.

OUTPUT FORMAT:
- Return ONLY the HTML code. No explanation, no markdown fences, no preamble.
- Start directly with <div>, <section>, or <style>.
- The output should be paste-ready into an Ontraport HTML element (after replacing {{IMAGE_N}} placeholders with real URLs).`;
  }

    const timerBlock = options.includeTimer

      ? `<div style="text-align:center;margin:2rem 0;"><a class="cta-btn" href="${structured.cta_url || '#'}">${escapeHtml(structured.cta_text)} →</a></div>`

      else if (pos === 'middle') {

  function escapeHtml(s) {
    if (!s) return '';
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function App() {
    const [apiKey, setApiKey] = useState(() => localStorage.getItem('claude_api_key') || '');
    const [showApiKey, setShowApiKey] = useState(false);
    const [templateKey, setTemplateKey] = useState('text-landing');

    // Oneshot mode state
    const [rawCopy, setRawCopy] = useState('');
    const [includeTimer, setIncludeTimer] = useState(false);
    const [wistiaId, setWistiaId] = useState('');
    const [formId, setFormId] = useState('');
    const [formPosition, setFormPosition] = useState('after-body');
    const [loading, setLoading] = useState(false);
    const [error, setError] = useState('');
    const [result, setResult] = useState(null);
    const [outputMode, setOutputMode] = useState('snippets');
    const [activeTab, setActiveTab] = useState('preview');

    // Chat mode state
    const [chatMessages, setChatMessages] = useState([]); // [{role, content, html?, images?}]
    const [chatInput, setChatInput] = useState('');
    const [chatAttachments, setChatAttachments] = useState([]); // [{id, name, base64, mediaType, dataUrl, sizeKb}]
    const [chatLoading, setChatLoading] = useState(false);
    const [currentHtml, setCurrentHtml] = useState('');
    const [chatHistory, setChatHistory] = useState([]); // for revert
    const [allUploadedImages, setAllUploadedImages] = useState([]); // running list of all images uploaded in this session, used for preview substitution

    // Persist API key locally so it isn't re-entered each time
    useEffect(() => {
      if (apiKey) localStorage.setItem('claude_api_key', apiKey);
    }, [apiKey]);

    const template = TEMPLATES[templateKey];
    const isChat = template.mode === 'chat';

    // Reset chat state when switching to/from chat mode
    useEffect(() => {
      if (isChat) {
        // entering chat mode — keep chat history
      } else {
        // leaving chat mode — keep chat state for when they return
      }
    }, [templateKey]);

    async function handleGenerate() {
      setError('');
      if (!apiKey.trim()) {
        setError('Please enter your Anthropic API key first.');
        return;
      }
      if (!rawCopy.trim()) {
        setError('Please paste some copy first.');
        return;
      }
      if (template.hasForm && !formId.trim()) {
        setError('This template requires an Ontraport Form ID. (You can use a placeholder like 12345 if you don\'t have it yet.)');
        return;
      }

      setLoading(true);
      try {
        const sys = buildSystemPrompt(templateKey, { includeTimer, wistiaId, formId, formPosition });
        const structured = await callClaude(apiKey, sys, rawCopy);
        setResult(structured);
        setActiveTab('preview');
      } catch (e) {
        setError(e.message || String(e));
      } finally {
        setLoading(false);
      }
    }

    async function handleChatSend() {
      const message = chatInput.trim();
      const attachments = chatAttachments;
      // Allow sending if there's text OR at least one image
      if (!message && attachments.length === 0) return;
      if (!apiKey.trim()) {
        setError('Please enter your Anthropic API key first.');
        return;
      }
      setError('');
      setChatLoading(true);

      // Save state for revert
      setChatHistory(prev => [...prev, { messages: chatMessages, html: currentHtml, allUploadedImages }]);

      // Track these images globally for preview substitution (append to running list)
      const newAllImages = [...allUploadedImages, ...attachments];
      setAllUploadedImages(newAllImages);

      // Append user message to chat (with image previews for display)
      const userMsg = {
        role: 'user',
        content: message || '(image only)',
        images: attachments.map(a => ({ name: a.name, dataUrl: a.dataUrl, sizeKb: a.sizeKb })),
      };
      const newMessages = [...chatMessages, userMsg];
      setChatMessages(newMessages);
      setChatInput('');
      setChatAttachments([]);

      try {
        const sys = buildBodySectionSystemPrompt();
        // Build API messages — Anthropic accepts multimodal content array
        const apiMessages = [];
        for (let i = 0; i < newMessages.length; i++) {
          const m = newMessages[i];
          const isLast = (i === newMessages.length - 1);
          if (m.role === 'user') {
            const contentBlocks = [];
            // Add image blocks first (if any) — only the actual current attachments
            // For historical messages we skip re-sending images (would cost too much)
            if (isLast && attachments.length > 0) {
              for (const att of attachments) {
                contentBlocks.push({
                  type: 'image',
                  source: {
                    type: 'base64',
                    media_type: att.mediaType,
                    data: att.base64,
                  },
                });
              }
            }
            // Build the text content
            let textContent = m.content;
            const startIdx = allUploadedImages.length + 1;
            const endIdx = allUploadedImages.length + attachments.length;
            const imageNoteForLast = isLast && attachments.length > 0
              ? `\n\n[The user has attached ${attachments.length} image(s). Refer to them as ${attachments.length === 1 ? `{{IMAGE_${startIdx}}}` : `{{IMAGE_${startIdx}}} through {{IMAGE_${endIdx}}}`} in the HTML output. Always use this exact placeholder format.]`
              : '';
            if (isLast && currentHtml && newMessages.length > 1) {
              textContent = `Current HTML you previously generated:\n\`\`\`html\n${currentHtml}\n\`\`\`\n\nUser request: ${message || 'Use the attached image(s) appropriately.'}${imageNoteForLast}`;
            } else if (isLast) {
              const baseText = message || 'Use the attached image(s) appropriately in a Mirasee body section.';
              textContent = `${baseText}${imageNoteForLast}`;
            }
            contentBlocks.push({ type: 'text', text: textContent });
            apiMessages.push({ role: 'user', content: contentBlocks });
          } else {
            // Assistant messages — text only (the HTML they previously generated)
            apiMessages.push({ role: 'assistant', content: m.html || m.content });
          }
        }

        const responseHtml = await callClaudeChat(apiKey, sys, apiMessages);
        const cleaned = cleanHtmlResponse(responseHtml);
        setCurrentHtml(cleaned);
        setChatMessages([...newMessages, { role: 'assistant', content: 'Updated.', html: cleaned }]);
      } catch (e) {
        setError(e.message || String(e));
        // Roll back the user message and restore attachments on error
        setChatMessages(chatMessages);
        setChatAttachments(attachments);
        setChatInput(message);
      } finally {
        setChatLoading(false);
      }
    }

    function handleRevert() {
      if (chatHistory.length === 0) return;
      const last = chatHistory[chatHistory.length - 1];
      setChatMessages(last.messages);
      setCurrentHtml(last.html);
      setAllUploadedImages(last.allUploadedImages || []);
      setChatHistory(chatHistory.slice(0, -1));
    }

    function handleClearChat() {
      if (chatMessages.length === 0) return;
      if (!confirm('Clear the chat and start fresh? This cannot be undone.')) return;
      setChatMessages([]);
      setCurrentHtml('');
      setChatHistory([]);
      setAllUploadedImages([]);
      setChatAttachments([]);
    }

    return h('div', { className: 'min-h-screen' },
      h(Header, null),
      h('main', { className: 'max-w-7xl mx-auto px-6 py-8' },
        h(ApiKeyBar, { apiKey, setApiKey, showApiKey, setShowApiKey }),
        isChat
          ? h(ChatModeView, {
              templateKey, setTemplateKey, template,
              chatMessages, chatInput, setChatInput,
              chatAttachments, setChatAttachments,
              chatLoading, currentHtml,
              allUploadedImages,
              chatHistory,
              onSend: handleChatSend,
              onRevert: handleRevert,
              onClear: handleClearChat,
              error, setError,
            })
          : h('div', { className: 'grid grid-cols-1 lg:grid-cols-2 gap-6 mt-6' },
              h(InputPanel, {
                templateKey, setTemplateKey,
                rawCopy, setRawCopy,
                includeTimer, setIncludeTimer,
                wistiaId, setWistiaId,
                formId, setFormId,
                formPosition, setFormPosition,
                template,
                onGenerate: handleGenerate,
                loading, error,
              }),
              h(OutputPanel, {
                result, loading, template, templateKey,
                options: { includeTimer, wistiaId, formId, formPosition },
                outputMode, setOutputMode,
                activeTab, setActiveTab,
              }),
            ),
        h(Footer, null),
      ),
    );
  }

  // Helper: read a File as base64 + dataURL
  function readFileAsImage(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => {
        const dataUrl = reader.result;
        const base64 = dataUrl.split(',')[1];
        resolve({
          id: Math.random().toString(36).slice(2),
          name: file.name,
          mediaType: file.type,
          base64,
          dataUrl,
          sizeKb: Math.round(file.size / 1024),
        });
      };
      reader.onerror = () => reject(new Error('Could not read ' + file.name));
      reader.readAsDataURL(file);
    });
  }

  function ChatPanel({ chatMessages, chatInput, setChatInput, chatAttachments, setChatAttachments, chatLoading, chatHistory, onSend, onRevert, onClear, error, setError }) {
    const scrollRef = useRef(null);
    const fileInputRef = useRef(null);
    const [isDragging, setIsDragging] = useState(false);

    useEffect(() => {
      if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
    }, [chatMessages, chatLoading]);

    function handleKeyDown(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        onSend();
      }
    }

    async function processFiles(fileList) {
      const files = Array.from(fileList).filter(f => f.type.startsWith('image/'));
      if (files.length === 0) {
        setError('Only image files (.jpg, .png, .webp, .gif) can be attached.');
        return;
      }
      // Anthropic API has a 5MB per-image limit. Warn if too big.
      const tooBig = files.filter(f => f.size > 5 * 1024 * 1024);
      if (tooBig.length > 0) {
        setError(`These images exceed 5MB and won't upload: ${tooBig.map(f => f.name).join(', ')}. Try compressing them.`);
      }
      const ok = files.filter(f => f.size <= 5 * 1024 * 1024);
      try {
        const processed = await Promise.all(ok.map(readFileAsImage));
        setChatAttachments([...chatAttachments, ...processed]);
      } catch (e) {
        setError('Could not read image: ' + e.message);
      }
    }

    function handleFilePick(e) {
      processFiles(e.target.files);
      e.target.value = ''; // reset so the same file can be selected twice in a row
    }

    function handleDrop(e) {
      e.preventDefault();
      setIsDragging(false);
      processFiles(e.dataTransfer.files);
    }

    function handleDragOver(e) {
      e.preventDefault();
      setIsDragging(true);
    }

    function handleDragLeave(e) {
      e.preventDefault();
      // Only un-set if we're leaving the panel itself, not entering a child
      if (e.currentTarget === e.target) setIsDragging(false);
    }

    function removeAttachment(id) {
      setChatAttachments(chatAttachments.filter(a => a.id !== id));
    }

    async function handlePaste(e) {
      const items = e.clipboardData?.items;
      if (!items) return;
      const imageItems = [];
      for (const item of items) {
        if (item.type.startsWith('image/')) {
          const f = item.getAsFile();
          if (f) imageItems.push(f);
        }
      }
      if (imageItems.length > 0) {
        e.preventDefault();
        processFiles(imageItems);
      }
    }

    return h('div', {
      className: `bg-white rounded-xl border-2 shadow-sm overflow-hidden flex flex-col transition-colors ${isDragging ? 'border-mirasee-blue bg-blue-50' : 'border-stone-200'}`,
      style: { height: '600px' },
      onDrop: handleDrop,
      onDragOver: handleDragOver,
      onDragLeave: handleDragLeave,
    },
      // Chat header
      h('div', { className: 'px-4 py-3 border-b border-stone-200 flex items-center justify-between flex-shrink-0' },
        h('div', null,
          h('h2', { className: 'font-display text-base font-semibold text-mirasee-ink flex items-center gap-2' },
            h('span', null, '💬'),
            'Chat with AI',
          ),
          h('p', { className: 'text-[11px] text-stone-500' }, 'Type, attach images, drag-drop, or paste'),
        ),
        h('div', { className: 'flex items-center gap-1' },
          chatHistory.length > 0 && h('button', {
            onClick: onRevert,
            title: 'Undo last change',
            className: 'px-2 py-1 text-[11px] text-stone-600 hover:text-mirasee-blue rounded hover:bg-stone-100',
          }, '↶ Undo'),
          chatMessages.length > 0 && h('button', {
            onClick: onClear,
            title: 'Clear chat and start fresh',
            className: 'px-2 py-1 text-[11px] text-stone-600 hover:text-red-600 rounded hover:bg-stone-100',
          }, 'Clear'),
        ),
      ),

      // Drag overlay
      isDragging && h('div', { className: 'flex-1 flex items-center justify-center p-8 pointer-events-none' },
        h('div', { className: 'text-center' },
          h('div', { className: 'text-4xl mb-2' }, '📎'),
          h('p', { className: 'text-sm font-semibold text-mirasee-blue' }, 'Drop images here'),
          h('p', { className: 'text-xs text-stone-500 mt-1' }, 'JPG, PNG, WebP, GIF · max 5MB each'),
        ),
      ),

      // Messages area
      !isDragging && h('div', { ref: scrollRef, className: 'flex-1 overflow-y-auto p-4 space-y-3' },
        chatMessages.length === 0 && h(ChatEmptyState, null),
        chatMessages.map((msg, i) =>
          h(ChatMessage, { key: i, msg, index: i }),
        ),
        chatLoading && h(ChatLoadingMessage, null),
      ),

      // Error
      error && h('div', { className: 'px-4 py-2 bg-red-50 border-t border-red-200 text-xs text-red-800 flex-shrink-0 flex items-center justify-between' },
        h('span', null, error),
        h('button', { onClick: () => setError(''), className: 'text-red-600 hover:text-red-800 ml-2 font-bold' }, '×'),
      ),

      // Attachment thumbnails (above input)
      chatAttachments.length > 0 && h('div', { className: 'border-t border-stone-200 p-2 bg-stone-50 flex-shrink-0' },
        h('div', { className: 'flex gap-2 flex-wrap' },
          chatAttachments.map(att =>
            h('div', { key: att.id, className: 'relative group' },
              h('img', {
                src: att.dataUrl,
                alt: att.name,
                className: 'w-16 h-16 object-cover rounded border border-stone-300',
              }),
              h('button', {
                onClick: () => removeAttachment(att.id),
                className: 'absolute -top-1.5 -right-1.5 w-5 h-5 rounded-full bg-mirasee-ink text-white text-xs flex items-center justify-center hover:bg-red-600',
                title: 'Remove',
              }, '×'),
              h('div', {
                className: 'absolute bottom-0 left-0 right-0 bg-black/70 text-white text-[9px] px-1 py-0.5 rounded-b truncate',
              }, `${att.sizeKb}kb`),
            ),
          ),
        ),
      ),

      // Input area
      h('div', { className: 'border-t border-stone-200 p-3 flex-shrink-0 bg-stone-50' },
        h('div', { className: 'flex gap-2 items-end' },
          // Hidden file input
          h('input', {
            ref: fileInputRef,
            type: 'file',
            accept: 'image/*',
            multiple: true,
            onChange: handleFilePick,
            style: { display: 'none' },
          }),
          // Attach button
          h('button', {
            onClick: () => fileInputRef.current?.click(),
            disabled: chatLoading,
            title: 'Attach images',
            className: 'p-2 rounded-lg border border-stone-300 hover:bg-white hover:border-mirasee-blue transition disabled:opacity-50 flex-shrink-0',
          },
            h('svg', { width: '18', height: '18', viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: '2', strokeLinecap: 'round', strokeLinejoin: 'round' },
              h('path', { d: 'm21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 17.99 8.8l-8.59 8.57a2 2 0 0 1-2.83-2.83l8.49-8.48' }),
            ),
          ),
          h('textarea', {
            value: chatInput,
            onChange: e => setChatInput(e.target.value),
            onKeyDown: handleKeyDown,
            onPaste: handlePaste,
            placeholder: chatMessages.length === 0
              ? 'Describe what you want to build...\n\nTry: "A testimonial section featuring this photo" (and attach an image)'
              : 'Tell me what to change... (you can also attach more images)',
            disabled: chatLoading,
            rows: 3,
            className: 'flex-1 px-3 py-2 rounded-lg border border-stone-300 text-sm focus:outline-none focus:ring-2 focus:ring-mirasee-blue/30 focus:border-mirasee-blue resize-none disabled:opacity-50',
          }),
          h('button', {
            onClick: onSend,
            disabled: chatLoading || (!chatInput.trim() && chatAttachments.length === 0),
            className: 'px-4 py-2 rounded-lg font-semibold text-white transition disabled:opacity-50 disabled:cursor-not-allowed self-stretch flex items-center justify-center',
            style: {
              background: chatLoading ? '#94a3b8' : 'radial-gradient(69.5% 64.74% at 3.29% 7.39%, #0089BD 0%, #013EA6 100%)',
              minWidth: '80px',
            },
          }, chatLoading ? '...' : 'Send'),
        ),
        h('div', { className: 'text-[10px] text-stone-400 mt-1 flex items-center justify-between' },
          h('span', null, 'Enter to send · Shift+Enter for new line · 📎 attach images'),
          chatAttachments.length > 0 && h('span', { className: 'text-mirasee-blue font-medium' },
            `${chatAttachments.length} image${chatAttachments.length > 1 ? 's' : ''} attached`,
          ),
        ),
      ),
    );
  }

  function ChatEmptyState() {
    return h('div', { className: 'h-full flex flex-col items-center justify-center text-center px-4 py-8' },
      h('div', { className: 'text-4xl mb-3 opacity-30' }, '💬'),
      h('p', { className: 'text-sm font-semibold text-mirasee-ink mb-2' }, 'Start a conversation'),
      h('p', { className: 'text-xs text-stone-500 max-w-xs leading-relaxed mb-4' },
        'Describe the body section you want. The AI will generate Mirasee-styled HTML you can paste into Ontraport. Then chat to refine it.',
      ),
      h('div', { className: 'text-[11px] text-stone-400 space-y-1.5 max-w-xs text-left bg-stone-50 rounded-lg p-3 border border-stone-200' },
        h('div', { className: 'font-semibold text-stone-600 mb-1' }, 'Try something like:'),
        h('div', null, '• "A 3-column grid showing the benefits of our AI training"'),
        h('div', null, '• "An FAQ section with 5 questions about pricing"'),
        h('div', null, '• "A quote callout from Danny followed by a yellow CTA"'),
        h('div', null, '• "What you\'ll learn list with 6 bullets and outline icons"'),
      ),
    );
  }

  function ChatMessage({ msg, index }) {
    if (msg.role === 'user') {
      return h('div', { className: 'flex justify-end' },
        h('div', { className: 'max-w-[85%]' },
          msg.images && msg.images.length > 0 && h('div', { className: 'flex gap-1.5 flex-wrap mb-1.5 justify-end' },
            msg.images.map((img, i) =>
              h('img', {
                key: i,
                src: img.dataUrl,
                alt: img.name,
                className: 'w-14 h-14 object-cover rounded border border-stone-300',
                title: `${img.name} (${img.sizeKb}kb)`,
              }),
            ),
          ),
          msg.content && msg.content !== '(image only)' && h('div', { className: 'px-3 py-2 rounded-lg bg-mirasee-blue text-white text-sm' },
            msg.content,
          ),
        ),
      );
    }
    return h('div', { className: 'flex justify-start' },
      h('div', { className: 'max-w-[85%] px-3 py-2 rounded-lg bg-stone-100 text-mirasee-ink text-sm flex items-center gap-2' },
        h('span', { className: 'text-base' }, '✓'),
        h('span', null, msg.html ? 'Done — preview updated' : msg.content),
      ),
    );
  }

  function ChatLoadingMessage() {
    return h('div', { className: 'flex justify-start' },
      h('div', { className: 'px-3 py-2 rounded-lg bg-stone-100 text-mirasee-ink text-sm flex items-center gap-2' },
        h('span', { className: 'dot-pulse' }), h('span', { className: 'dot-pulse' }), h('span', { className: 'dot-pulse' }),
        h('span', { className: 'ml-1 text-stone-500' }, 'Thinking...'),
      ),
    );
  }

  function BodySectionPreview({ currentHtml, chatLoading, allUploadedImages }) {
    // Substitute {{IMAGE_N}} placeholders with data URLs for live preview
    const previewHtml = applyImagePlaceholders(currentHtml, allUploadedImages);
    const fullDoc = previewHtml ? `<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  body { margin: 0; font-family: 'Montserrat', sans-serif; color: #0A1530; background: white; }
  * { box-sizing: border-box; }
  /* Cap font weights at 600 even if AI tries to override */
  h1, h2, h3, h4, h5, h6, strong, b { font-weight: 600 !important; }
</style>
</head><body>${previewHtml}</body></html>` : '';

    return h('div', { className: 'bg-white rounded-xl border border-stone-200 shadow-sm overflow-hidden' },
      h('div', { className: 'px-4 py-2.5 border-b border-stone-200 flex items-center justify-between' },
        h('div', { className: 'flex items-center gap-2' },
          h('span', { className: 'text-sm' }, '👁'),
          h('span', { className: 'text-xs font-semibold text-mirasee-ink' }, 'Live Preview'),
        ),
        currentHtml && h('span', { className: 'text-[10px] text-stone-500 font-mono' }, `${currentHtml.length} chars`),
      ),
      h('div', { className: 'bg-stone-50', style: { minHeight: '300px' } },
        !currentHtml && !chatLoading && h('div', { className: 'h-[300px] flex items-center justify-center text-center px-4' },
          h('div', null,
            h('div', { className: 'text-4xl mb-2 opacity-20' }, '✨'),
            h('p', { className: 'text-xs text-stone-500' }, 'Your section will appear here once you describe it'),
          ),
        ),
        chatLoading && !currentHtml && h('div', { className: 'h-[300px] flex items-center justify-center' },
          h('div', { className: 'text-stone-500 flex items-center gap-2 text-sm' },
            h('span', { className: 'dot-pulse' }), h('span', { className: 'dot-pulse' }), h('span', { className: 'dot-pulse' }),
            h('span', { className: 'ml-2' }, 'Generating...'),
          ),
        ),
        currentHtml && h('iframe', {
          srcDoc: fullDoc,
          className: 'w-full bg-white',
          style: { minHeight: '400px', height: '500px', border: 'none' },
          title: 'Body section preview',
          sandbox: 'allow-same-origin allow-popups',
        }),
      ),
    );
  }

  function BodySectionCode({ currentHtml, allUploadedImages }) {
    if (!currentHtml) return null;
    const hasImages = allUploadedImages && allUploadedImages.length > 0;
    return h('div', { className: 'bg-white rounded-xl border border-stone-200 shadow-sm overflow-hidden' },
      h('div', { className: 'px-4 py-2.5 border-b border-stone-200 flex items-center justify-between' },
        h('div', { className: 'flex items-center gap-2' },
          h('span', { className: 'text-sm' }, '✂️'),
          h('span', { className: 'text-xs font-semibold text-mirasee-ink' }, 'HTML Code'),
          h('span', { className: 'text-[10px] text-stone-500' }, '— paste into Ontraport HTML element'),
        ),
        h(CopyButton, { text: currentHtml, label: 'Copy code' }),
      ),
      hasImages && h('div', { className: 'px-4 py-2 bg-amber-50 border-b border-amber-200 text-[11px] text-amber-900' },
        h('strong', null, '⚠️ Image placeholders: '),
        `The code contains ${allUploadedImages.length} placeholder${allUploadedImages.length > 1 ? 's' : ''} (`,
        allUploadedImages.map((_, i) => `{{IMAGE_${i + 1}}}`).join(', '),
        `). Before pasting into Ontraport, upload your images to Ontraport's media library and replace each placeholder with the real URL.`,
      ),
      h('pre', { className: 'code-block !rounded-none !max-h-[300px]' }, currentHtml),
    );
  }

  function Footer() {
    return h('footer', { className: 'mt-12 pt-6 border-t border-stone-200 text-center text-xs text-stone-500' },
      h('p', null,
        'Built for the Mirasee design team · ',
        h('a', { href: 'https://docs.claude.com', className: 'text-mirasee-blue hover:underline' }, 'Powered by Claude'),
        ' · ',
        h('span', null, 'Your API key and copy never leave your browser'),
      ),
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
